<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Add New Rental - Smart Rental</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body class="bg-[#F7F4EB] min-h-screen text-[#3D332A] font-sans pb-12">

  <nav class="w-full bg-[#EFEAE0] border-b border-gray-200 px-8 py-4 flex items-center justify-between mb-4">
    <div class="flex items-center gap-3">
      <div class="text-[#3D332A]">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
      </div>
      <div class="leading-none">
        <span class="block text-lg font-bold tracking-wider uppercase">Smart</span>
        <span class="block text-xs font-semibold tracking-widest opacity-80 uppercase">Rentals</span>
      </div>
    </div>
    <div class="flex gap-4 font-semibold text-sm">
      <a href="{{ url_for('index') }}" class="text-gray-500 hover:text-[#4D7254] pb-1">🏢 ห้องและสัญญา</a>
      <a href="{{ url_for('tenants') }}" class="text-gray-500 hover:text-[#4D7254] pb-1">👥 ผู้เช่า</a>
      <a href="{{ url_for('payments') }}" class="text-gray-500 hover:text-[#4D7254] pb-1">💰 การเงิน</a>
      <a href="{{ url_for('maintenance') }}" class="text-gray-500 hover:text-[#4D7254] pb-1">🔧 แจ้งซ่อม</a>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-6">
    <div class="mb-6">
      <a href="{{ url_for('index') }}" class="text-sm text-gray-500 hover:text-[#4D7254]">← กลับหน้าสรุป</a>
      <h1 class="text-2xl font-bold mt-2">เพิ่มห้องพักและบันทึกสัญญาเช่า</h1>
    </div>

    <form action="{{ url_for('add_rental') }}" method="POST" class="space-y-6">

      <!-- Rooms -->
      <div class="bg-white rounded-2xl border border-gray-100 p-6 shadow-sm space-y-4">
        <h3 class="font-bold text-base text-[#4D7254] border-b pb-2">🏢 ข้อมูลห้องพัก (ตาราง Rooms)</h3>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
          <div>
            <label class="block text-xs font-medium mb-1">ชื่อคอนโด *</label>
            <input type="text" name="condo_name" required placeholder="เช่น Baandee Condo A" class="w-full bg-[#F7F4EB] border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#4D7254]">
          </div>
          <div>
            <label class="block text-xs font-medium mb-1">หมายเลขห้อง *</label>
            <input type="text" name="room_number" required placeholder="เช่น 101" class="w-full bg-[#F7F4EB] border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#4D7254]">
          </div>
          <div>
            <label class="block text-xs font-medium mb-1">ชั้น</label>
            <input type="text" name="floor" placeholder="เช่น 5" class="w-full bg-[#F7F4EB] border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#4D7254]">
          </div>
          <div>
            <label class="block text-xs font-medium mb-1">ขนาด (ตร.ม.) *</label>
            <input type="number" step="0.01" name="room_size" required placeholder="เช่น 32.5" class="w-full bg-[#F7F4EB] border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#4D7254]">
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium mb-1">ลิงก์รูปภาพ (Image URL)</label>
          <input type="url" id="room_image_input" name="room_image" placeholder="https://example.com/image.jpg" class="w-full bg-[#F7F4EB] border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#4D7254]">
        </div>
        <div class="border border-dashed border-gray-200 rounded-xl h-40 flex items-center justify-center bg-[#FDFCF9] overflow-hidden">
          <img id="room_preview" src="" alt="Room Preview" class="w-full h-full object-cover hidden">
          <span id="preview_placeholder" class="text-xs text-gray-400 italic">กรอก URL เพื่อดูตัวอย่าง</span>
        </div>
      </div>

      <!-- Tenants -->
      <div class="bg-white rounded-2xl border border-gray-100 p-6 shadow-sm space-y-4">
        <h3 class="font-bold text-base text-[#4D7254] border-b pb-2">👤 ข้อมูลผู้เช่า (ตาราง Tenants)</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-medium mb-1">ชื่อจริง *</label>
            <input type="text" name="first_name" required placeholder="เช่น สมชาย" class="w-full bg-[#F7F4EB] border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#4D7254]">
          </div>
          <div>
            <label class="block text-xs font-medium mb-1">นามสกุล</label>
            <input type="text" name="last_name" placeholder="เช่น ใจดี" class="w-full bg-[#F7F4EB] border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#4D7254]">
          </div>
          <div>
            <label class="block text-xs font-medium mb-1">เบอร์โทรศัพท์ *</label>
            <input type="tel" name="tenant_phone" required placeholder="เช่น 0812345678" class="w-full bg-[#F7F4EB] border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#4D7254]">
          </div>
          <div>
            <label class="block text-xs font-medium mb-1">อีเมล</label>
            <input type="email" name="tenant_email" placeholder="เช่น somchai@email.com" class="w-full bg-[#F7F4EB] border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#4D7254]">
          </div>
        </div>
      </div>

      <!-- Contracts -->
      <div class="bg-white rounded-2xl border border-gray-100 p-6 shadow-sm space-y-4">
        <h3 class="font-bold text-base text-[#4D7254] border-b pb-2">📄 รายละเอียดสัญญา (ตาราง Contracts)</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-medium mb-1">ค่าเช่ารายเดือน (บาท) *</label>
            <input type="number" name="monthly_rent" min="0" required placeholder="เช่น 12000" class="w-full bg-[#F7F4EB] border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#4D7254]">
          </div>
          <div>
            <label class="block text-xs font-medium mb-1">เงินประกัน (บาท)</label>
            <input type="number" name="deposit" min="0" placeholder="เช่น 24000" class="w-full bg-[#F7F4EB] border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#4D7254]">
          </div>
          <div>
            <label class="block text-xs font-medium mb-1">วันเริ่มต้นสัญญา *</label>
            <input type="date" name="start_date" required class="w-full bg-[#F7F4EB] border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#4D7254]">
          </div>
          <div>
            <label class="block text-xs font-medium mb-1">วันสิ้นสุดสัญญา *</label>
            <input type="date" name="end_date" required class="w-full bg-[#F7F4EB] border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:ring-1 focus:ring-[#4D7254]">
          </div>
        </div>
      </div>

      <div class="flex justify-end gap-3">
        <a href="{{ url_for('index') }}" class="px-5 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg font-medium text-sm transition">ยกเลิก</a>
        <button type="submit" class="px-6 py-2 bg-[#4D7254] hover:bg-[#3d5b43] text-white rounded-lg font-semibold text-sm shadow-sm transition">💾 บันทึกข้อมูล</button>
      </div>
    </form>
  </main>

  <script>
    const imgInput = document.getElementById('room_image_input');
    const imgPreview = document.getElementById('room_preview');
    const placeholder = document.getElementById('preview_placeholder');
    imgInput.addEventListener('input', function() {
      if(this.value.trim()) {
        imgPreview.src = this.value;
        imgPreview.classList.remove('hidden');
        placeholder.classList.add('hidden');
      } else {
        imgPreview.src = "";
        imgPreview.classList.add('hidden');
        placeholder.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
